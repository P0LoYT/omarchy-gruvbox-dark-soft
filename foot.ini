# Gruvbox Dark Soft theme for Foot terminal
[colors-dark]

# Soft dark contrast background and warm cream foreground
background=32302f
foreground=ebdbb2

## Normal/Regular Colors (0-7)
# black (bg0), red, green, yellow
regular0=282828
regular1=cc241d
regular2=98971a
regular3=d79921
# blue, magenta, cyan, white (fg4)
regular4=458588
regular5=b16286
regular6=689d6a
regular7=a89984

## Bright Colors (8-15)
# bright black (gray), bright red, bright green, bright yellow
bright0=928374
bright1=fb4934
bright2=b8bb26
bright3=fabd2f
# bright blue, bright magenta, bright cyan, bright white (fg1)
bright4=83a598
bright5=d3869b
bright6=8ec07c
bright7=ebdbb2

## Selection & UI Tweaks
# Uses bg2 for selection block, and fg0 (crisp cream) for highlighted text
selection-background=504945
selection-foreground=fbf1c7

# Matches the cursor to the classic Gruvbox yellow accent
cursor=d79921 32302f

# URL underlines on hover (uses the bright blue accent)
urls=83a598